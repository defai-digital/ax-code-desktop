name: Publish VS Code Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # This repo's release line does not currently ship a VS Code extension
  # (packages/vscode is absent). Detect it so the publish job skips gracefully
  # instead of failing every tag, and auto-runs if the package returns.
  detect:
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect VS Code package
        id: check
        run: |
          if [ -f packages/vscode/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::packages/vscode is not present — skipping VS Code extension publish."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: detect
    if: ${{ needs.detect.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build VS Code extension
        run: bun run --cwd packages/vscode build

      - name: Package extension
        run: cd packages/vscode && bunx vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: cd packages/vscode && bunx vsce publish -p "$VSCE_PAT" --no-dependencies

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: bunx ovsx publish packages/vscode/*.vsix -p "$OVSX_PAT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: openchamber-vscode-vsix
          path: packages/vscode/*.vsix

      - name: Attach VSIX to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/vscode/*.vsix
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
