name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (skip publishing)'
        required: false
        default: 'false'
        type: boolean

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  # softprops/action-gh-release@v2 still bundles a Node.js 20 runtime, which
  # GitHub deprecated. Force JS actions to run on Node.js 24 until the action
  # ships a Node 24 runtime. setup-node's node-version does not affect this.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  preflight:
    name: Test, type-check, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: ./scripts/ci-retry.sh bun install --frozen-lockfile

      - name: Check internal boundary
        run: bun run check:internal

      - name: Check boundary imports
        run: bun run check:boundary

      - name: Check endpoint contracts
        run: bun run check:endpoint-contracts

      - name: Test
        run: bun run test

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

  create-release:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      release_upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: get_version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for release
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const changelogPath = 'CHANGELOG.md';
          if (!fs.existsSync(changelogPath)) {
            throw new Error('CHANGELOG.md not found; add it before releasing.');
          }
          const changelog = fs.readFileSync(changelogPath, 'utf8');
          const sections = changelog.split(/^## /m);
          const section = sections.find(s => s.startsWith('[' + version + ']'));
          if (!section) {
            throw new Error('Changelog section [' + version + '] not found. Add a section like "## [' + version + '] - YYYY-MM-DD".');
          }
          const content = ('## ' + section).trim();
          fs.mkdirSync('artifacts', { recursive: true });
          fs.writeFileSync('artifacts/release-notes.md', content + '\n');
          NODE

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          draft: true
          generate_release_notes: false
          body_path: artifacts/release-notes.md
          name: AX Code Desktop v${{ steps.get_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: create-release
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: ./scripts/ci-retry.sh bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Create npm tarball
        working-directory: packages/web
        # `npm pack` emits a package-name-derived tarball. Rebrand the release
        # asset to ax-code-web-<version>.tgz (contents/installability unchanged).
        run: |
          npm pack
          tarball="$(find . -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          if [[ -z "$tarball" ]]; then
            echo "::error::npm pack did not produce a tarball"
            exit 1
          fi
          mv "$tarball" "ax-code-web-${{ needs.create-release.outputs.version }}.tgz"

      - name: Upload npm tarball to release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: packages/web/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # npm registry publish is opt-in: the package name (@openchamber/web) is
      # kept for backwards-compat, but publishing it requires owning that scope.
      # Enable by setting repo variable PUBLISH_NPM=true with a publishable
      # package and NPM_TOKEN. Kept non-fatal so a publish error never blocks the
      # release — the tarball is attached to the GitHub release regardless.
      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' && vars.PUBLISH_NPM == 'true' && env.HAS_NPM_TOKEN == 'true' }}
        continue-on-error: true
        working-directory: packages/web
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-desktop-electron-macos:
    needs: create-release
    runs-on: macos-26
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
            platform: darwin-aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: ./scripts/ci-retry.sh bun install --frozen-lockfile

      - name: Install Apple Certificate
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/electron-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build Electron app
        working-directory: packages/electron
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # rebuild-native.mjs reads this to target the right arch.
          ELECTRON_BUILDER_ARCH: ${{ matrix.arch }}
          # With no signing certificate, disable identity auto-discovery so
          # electron-builder produces an unsigned build (and skips notarization,
          # which only runs for signed apps) instead of failing the release.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.HAS_APPLE_CERT }}
        run: |
          if [ "$HAS_APPLE_CERT" != "true" ]; then
            echo "::warning::No Apple signing certificate configured — building unsigned macOS artifacts without notarization."
          fi
          bun run build:web-assets
          bun run bundle:main
          # npmRebuild=false in package.json, so electron-builder won't
          # recompile native deps on its own — we must rebuild against the
          # target Electron ABI before packaging, otherwise better-sqlite3/
          # node-pty/bun-pty crash on require inside the packaged app.
          bun run rebuild:native
          bunx electron-builder --mac --${{ matrix.arch }} --publish=never

      - name: Verify signature + entitlements + notarization
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        run: |
          set -euo pipefail

          APP_DIR="packages/electron/dist/mac"
          [ -d "packages/electron/dist/mac-arm64" ] && APP_DIR="packages/electron/dist/mac-arm64"

          APP_PATH=$(find "$APP_DIR" -maxdepth 2 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found under packages/electron/dist/mac*"
            ls -la packages/electron/dist/
            exit 1
          fi

          echo "Verifying $APP_PATH"
          codesign -vv --deep --strict "$APP_PATH"

          # Require hardened runtime
          CS_INFO=$(codesign -dv --verbose=4 "$APP_PATH" 2>&1)
          echo "$CS_INFO"
          if ! echo "$CS_INFO" | grep -q "flags=.*runtime"; then
            echo "Error: hardened runtime flag missing"
            exit 1
          fi

          # Require notary ticket stapled
          xcrun stapler validate "$APP_PATH"

          ENTITLEMENTS=$(codesign -d --entitlements :- "$APP_PATH" 2>&1 || true)
          if echo "$ENTITLEMENTS" | grep -q "com.apple.security.app-sandbox"; then
            echo "Error: app sandbox entitlement is present"
            exit 1
          fi
          for key in \
            com.apple.security.cs.allow-jit \
            com.apple.security.cs.allow-unsigned-executable-memory \
            com.apple.security.cs.disable-library-validation
          do
            if ! echo "$ENTITLEMENTS" | grep -q "<key>$key</key>"; then
              echo "Error: required entitlement missing: $key"
              exit 1
            fi
          done

      - name: Packaged app launch smoke
        run: |
          set -euo pipefail
          APP_DIR="packages/electron/dist/mac"
          [ -d "packages/electron/dist/mac-arm64" ] && APP_DIR="packages/electron/dist/mac-arm64"
          APP_PATH=$(find "$APP_DIR" -maxdepth 2 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found under packages/electron/dist/mac*"
            exit 1
          fi
          node packages/electron/scripts/smoke-packaged-app.mjs \
            --app "$APP_PATH" \
            --artifacts "$RUNNER_TEMP/desktop-smoke"

      - name: Upload macOS smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-release-smoke-logs-macos-${{ matrix.arch }}
          path: ${{ runner.temp }}/desktop-smoke
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload DMG / ZIP / blockmaps to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            packages/electron/dist/*.dmg
            packages/electron/dist/*.zip
            packages/electron/dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage signed Electron app for Tauri updater repackage
        run: |
          set -euo pipefail

          APP_DIR="packages/electron/dist/mac"
          [ -d "packages/electron/dist/mac-arm64" ] && APP_DIR="packages/electron/dist/mac-arm64"

          APP_PATH=$(find "$APP_DIR" -maxdepth 2 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found under packages/electron/dist/mac*"
            ls -la packages/electron/dist/
            exit 1
          fi

          rm -rf electron-app-artifact
          mkdir -p electron-app-artifact
          cp -R "$APP_PATH" electron-app-artifact/OpenChamber.app
          tar -C electron-app-artifact -czf electron-app-${{ matrix.arch }}.tar.gz OpenChamber.app

      - name: Upload signed Electron app for Tauri updater repackage
        uses: actions/upload-artifact@v7
        with:
          name: electron-app-${{ matrix.arch }}
          path: electron-app-${{ matrix.arch }}.tar.gz
          retention-days: 1

      - name: Upload per-arch latest-mac.yml for merge
        uses: actions/upload-artifact@v7
        with:
          name: latest-yml-${{ matrix.target }}
          path: packages/electron/dist/latest-mac.yml
          retention-days: 1

  build-desktop-electron-windows:
    needs: create-release
    # x64 builds on the standard runner; arm64 needs a native Windows-on-ARM
    # runner so native modules (better-sqlite3/node-pty) compile for the target.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
            platform: win32-x64
            runner: windows-2022
          - arch: arm64
            target: aarch64-pc-windows-msvc
            platform: win32-arm64
            runner: windows-11-arm
    env:
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        shell: bash
        run: ./scripts/ci-retry.sh bun install --frozen-lockfile

      - name: Build web assets
        working-directory: packages/electron
        run: bun run build:web-assets

      - name: Bundle main process
        working-directory: packages/electron
        run: bun run bundle:main

      - name: Rebuild native modules
        working-directory: packages/electron
        shell: bash
        # npmRebuild=false in electron-builder.yml, so we rebuild manually here
        # to target the exact Electron ABI before packaging.
        run: node ./scripts/rebuild-native.mjs

      - name: Decode and stage Windows code-signing certificate
        if: ${{ env.HAS_WINDOWS_CERT == 'true' }}
        shell: bash
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$WINDOWS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          # electron-builder native Windows signing env vars.
          echo "WIN_CSC_LINK=$RUNNER_TEMP/certificate.p12" >> "$GITHUB_ENV"
          echo "WIN_CSC_KEY_PASSWORD=$WINDOWS_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Windows app
        working-directory: packages/electron
        shell: bash
        run: ../../scripts/ci-retry.sh node ./scripts/package.mjs --win --${{ matrix.arch }} --publish=never

      - name: Upload installer and portable zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            packages/electron/dist/*.exe
            packages/electron/dist/*.zip
            packages/electron/dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # latest.yml is named identically for every arch, so each arch uploads it
      # as a per-target artifact and combine-electron-windows-manifests merges
      # them into one release-level latest.yml (electron-updater picks the entry
      # matching the running CPU arch).
      - name: Upload update manifest as artifact
        uses: actions/upload-artifact@v7
        with:
          name: latest-yml-${{ matrix.target }}
          path: packages/electron/dist/latest.yml
          retention-days: 1

  combine-electron-manifests:
    needs: [create-release, build-desktop-electron-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download per-arch latest-mac.yml
        uses: actions/download-artifact@v4
        with:
          pattern: latest-yml-*-apple-darwin
          path: artifacts

      - name: Finalize combined latest-mac.yml
        env:
          LATEST_YML_DIR: ${{ github.workspace }}/artifacts
          GH_REPO: ${{ github.repository }}
          AX_CODE_DESKTOP_VERSION: ${{ needs.create-release.outputs.version }}
        run: node packages/electron/scripts/finalize-latest-yml.mjs

      - name: Upload combined manifests to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            ${{ runner.temp }}/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  combine-electron-windows-manifests:
    needs: [create-release, build-desktop-electron-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download per-arch Windows latest.yml
        uses: actions/download-artifact@v4
        with:
          pattern: latest-yml-*-pc-windows-msvc
          path: artifacts

      - name: Finalize combined latest.yml
        env:
          LATEST_YML_DIR: ${{ github.workspace }}/artifacts
          GH_REPO: ${{ github.repository }}
          AX_CODE_DESKTOP_VERSION: ${{ needs.create-release.outputs.version }}
        run: node packages/electron/scripts/finalize-windows-latest-yml.mjs

      - name: Upload combined Windows manifest to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            ${{ runner.temp }}/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sign-release-assets:
    needs: [create-release, build-desktop-electron-macos, build-desktop-electron-windows, publish-npm, combine-electron-manifests, combine-electron-windows-manifests]
    if: >-
      always() &&
      needs.create-release.result == 'success' &&
      needs.build-desktop-electron-macos.result == 'success' &&
      needs.build-desktop-electron-windows.result == 'success' &&
      needs.publish-npm.result == 'success' &&
      needs.combine-electron-manifests.result == 'success' &&
      needs.combine-electron-windows-manifests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "v${VERSION}" --repo "$REPOSITORY" --dir release-assets --clobber

      - name: Sign release assets
        env:
          AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64: ${{ secrets.AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64 }}
          AX_CODE_DESKTOP_MINISIGN_PASSWORD: ${{ secrets.AX_CODE_DESKTOP_MINISIGN_PASSWORD }}
          MINISIGN_PASSWORD: ${{ secrets.AX_CODE_DESKTOP_MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail

          SECRET_KEY="$RUNNER_TEMP/ax-code-desktop.minisign.key"
          PUBLIC_KEY="$RUNNER_TEMP/ax-code-desktop.minisign.pub"
          cat > "$PUBLIC_KEY" <<'EOF'
          untrusted comment: minisign public key 8138FAD32CAD95BA
          RWS6la0s0/o4gdFUZ0Bk/BkrnN8qC2CFOfLXVP5OtQTrvm1BQeOvXgao
          EOF

          assets=()
          while IFS= read -r -d '' file; do
            case "$file" in
              *.minisig|*.sig)
                ;;
              *)
                assets+=("$file")
                ;;
            esac
          done < <(find release-assets -type f -print0)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No release assets found to sign"
            exit 1
          fi

          if [ -z "$AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64" ] || [ -z "$AX_CODE_DESKTOP_MINISIGN_PASSWORD" ]; then
            echo "::notice::Release signing secrets are not configured; verifying existing detached minisign signatures instead."
            missing=()
            for asset in "${assets[@]}"; do
              sig="$asset.minisig"
              if [ ! -f "$sig" ]; then
                missing+=("$asset")
                continue
              fi
              minisign -V -q -p "$PUBLIC_KEY" -m "$asset" -x "$sig"
            done
            if [ "${#missing[@]}" -gt 0 ]; then
              echo "::error::Release assets are missing minisign signatures and CI cannot sign without AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64 and AX_CODE_DESKTOP_MINISIGN_PASSWORD."
              printf '  %s\n' "${missing[@]}" >&2
              exit 1
            fi
            exit 0
          fi

          printf '%s' "$AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64" | base64 -d > "$SECRET_KEY"
          chmod 600 "$SECRET_KEY"

          ./scripts/minisign-artifacts.sh --secret-key "$SECRET_KEY" --public-key "$PUBLIC_KEY" --force "${assets[@]}"

      - name: Upload minisign signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          signatures=()
          while IFS= read -r -d '' file; do
            signatures+=("$file")
          done < <(find release-assets -type f -name '*.minisig' -print0)
          if [ "${#signatures[@]}" -eq 0 ]; then
            echo "::error::No .minisig files were produced"
            exit 1
          fi
          gh release upload "v${VERSION}" --repo "$REPOSITORY" --clobber "${signatures[@]}"

      - name: Verify release signature coverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          release_json="$(gh release view "v${VERSION}" --repo "$REPOSITORY" --json assets,isDraft)"
          RELEASE_JSON="$release_json" node <<'NODE'
          const release = JSON.parse(process.env.RELEASE_JSON);
          const names = new Set(release.assets.map((asset) => asset.name));
          const unsignedAssets = release.assets
            .map((asset) => asset.name)
            .filter((name) => !name.endsWith('.minisig') && !name.endsWith('.sig'));
          const missing = unsignedAssets.filter((name) => !names.has(`${name}.minisig`));
          if (missing.length > 0) {
            console.error('Release assets missing minisign signatures:');
            for (const name of missing) console.error(`  ${name}`);
            process.exit(1);
          }
          NODE

  finalize-release:
    needs: [create-release, build-desktop-electron-macos, build-desktop-electron-windows, publish-npm, combine-electron-manifests, combine-electron-windows-manifests, sign-release-assets]
    # Publish the release once the core artifacts are in place.
    if: >-
      always() &&
      needs.create-release.result == 'success' &&
      needs.build-desktop-electron-macos.result == 'success' &&
      needs.build-desktop-electron-windows.result == 'success' &&
      needs.publish-npm.result == 'success' &&
      needs.combine-electron-manifests.result == 'success' &&
      needs.combine-electron-windows-manifests.result == 'success' &&
      needs.sign-release-assets.result == 'success'
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_UPDATE_ROLE_ID: ${{ secrets.DISCORD_UPDATE_ROLE_ID }}
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send release to Discord
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
          REPOSITORY: ${{ github.repository }}
          UPDATE_ROLE_ID: ${{ env.DISCORD_UPDATE_ROLE_ID }}
        run: |
          node - <<'NODE'
          (async () => {
            const tag = `v${process.env.VERSION}`;
            const repo = process.env.REPOSITORY;
            const rawRoleId = (process.env.UPDATE_ROLE_ID || '').trim();
            const updateRoleId = /^\d+$/.test(rawRoleId) ? rawRoleId : '';

            const releaseRes = await fetch(`https://api.github.com/repos/${repo}/releases/tags/${tag}`, {
              headers: {
                Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                Accept: 'application/vnd.github+json',
              },
            });

            if (!releaseRes.ok) {
              const body = await releaseRes.text();
              throw new Error(`Failed to fetch release ${tag}: ${releaseRes.status} ${body}`);
            }

            const release = await releaseRes.json();
            const description = (release.body || `AX Code Desktop ${tag} released.`).slice(0, 4096);
            const mention = updateRoleId ? `<@&${updateRoleId}>` : '';

            const payload = {
              username: 'AX Code Desktop Releases',
              ...(mention ? { content: mention } : {}),
              ...(updateRoleId
                ? {
                    allowed_mentions: {
                      roles: [updateRoleId],
                    },
                  }
                : {}),
              embeds: [
                {
                  title: release.name || `AX Code Desktop ${tag}`,
                  url: release.html_url,
                  description,
                  color: 2105893,
                  footer: { text: 'AX Code Desktop Changelog' },
                },
              ],
            };

            const discordRes = await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify(payload),
            });

            if (!discordRes.ok) {
              const body = await discordRes.text();
              throw new Error(`Failed to send Discord release: ${discordRes.status} ${body}`);
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Trigger ax-code-website site refresh (optional)
        env:
          WEBSITE_REPO: defai-digital/ax-code-website
          WEBSITE_TOKEN: ${{ secrets.AX_CODE_WEBSITE_REPO_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail

          if [ -z "$WEBSITE_TOKEN" ]; then
            echo "AX_CODE_WEBSITE_REPO_TOKEN not set; skip site refresh dispatch."
            exit 0
          fi

          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $WEBSITE_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$WEBSITE_REPO/dispatches" \
            -d @- <<JSON
          {
            "event_type": "site_refresh_requested",
            "client_payload": {
              "source_repo": "${{ github.repository }}",
              "release_tag": "v$VERSION"
            }
          }
          JSON

  update-homebrew-tap:
    needs: [create-release, finalize-release]
    if: >-
      always() &&
      needs.finalize-release.result == 'success'
    runs-on: ubuntu-latest
    env:
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - name: Skip if no tap token configured
        if: ${{ env.HAS_TAP_TOKEN != 'true' }}
        run: echo "::notice::HOMEBREW_TAP_TOKEN not configured — skipping Homebrew tap update."

      - name: Download release DMG and compute SHA256
        if: ${{ env.HAS_TAP_TOKEN == 'true' }}
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          curl -fsSL -o release.dmg \
            "https://github.com/defai-digital/ax-code-desktop/releases/download/v${VERSION}/AX-Code-Desktop-${VERSION}-arm64.dmg"
          echo "DMG_SHA256=$(sha256sum release.dmg | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Push updated cask to homebrew-tap
        if: ${{ env.HAS_TAP_TOKEN == 'true' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/defai-digital/homebrew-ax-code-desktop.git" homebrew-tap
          cd homebrew-tap
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const sha256 = process.env.DMG_SHA256;
          const cask = [
            'cask "ax-code-desktop" do',
            `  version "${version}"`,
            `  sha256 "${sha256}"`,
            '',
            '  url "https://github.com/defai-digital/ax-code-desktop/releases/download/v#{version}/AX-Code-Desktop-#{version}-arm64.dmg"',
            '  name "AX Code Desktop"',
            '  desc "AI coding assistant desktop app powered by AX Code"',
            '  homepage "https://github.com/defai-digital/ax-code-desktop"',
            '',
            '  app "AX Code Desktop.app"',
            '',
            '  postflight do',
            '    system_command "/usr/bin/xattr",',
            '      args: ["-cr", "#{appdir}/AX Code Desktop.app"]',
            '  end',
            '',
            '  zap trash: [',
            '    "~/Library/Application Support/AX Code Desktop",',
            '    "~/Library/Preferences/ai.defai.ax-code-app.plist",',
            '    "~/Library/Caches/AX Code Desktop",',
            '    "~/Library/Logs/AX Code Desktop",',
            '  ]',
            'end',
            '',
          ].join('\n');
          fs.mkdirSync('Casks', { recursive: true });
          fs.writeFileSync('Casks/ax-code-desktop.rb', cask);
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ax-code-desktop.rb
          git diff --cached --quiet && echo "No cask changes to commit." && exit 0
          git commit -m "Update ax-code-desktop cask to ${VERSION}"
          git push
