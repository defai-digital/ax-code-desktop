services:
  openchamber:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openchamber
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/openchamber:/home/openchamber/.config/openchamber
      - ./data/ax-code/share:/home/openchamber/.local/share/ax-code
      - ./data/ax-code/state:/home/openchamber/.local/state/ax-code
      - ./data/ax-code/config:/home/openchamber/.config/ax-code
      - ./data/ssh:/home/openchamber/.ssh
      - ./workspaces:/home/openchamber/workspaces
    #environment:
    # AX_CODE_DESKTOP_HOST: 0.0.0.0  # Bind address (default in Docker: 0.0.0.0)
    # UI_PASSWORD: your_secure_password_here  # Uncomment to set UI password
    # AX_CODE_DESKTOP_TUNNEL_PROVIDER: cloudflare
    # AX_CODE_DESKTOP_TUNNEL_MODE: quick  # quick | managed-remote | managed-local
    # AX_CODE_DESKTOP_TUNNEL_HOSTNAME: app.example.com  # required for managed-remote
    # AX_CODE_DESKTOP_TUNNEL_TOKEN: your_cloudflare_token  # required for managed-remote
    # AX_CODE_DESKTOP_TUNNEL_CONFIG: /home/openchamber/.cloudflared/config.yml  # optional for managed-local
    # OH_MY_AX_CODE: true # enable oh-my-ax-code
    # AX_CODE_HOST: http://172.17.0.1:4096 # Connect to external AX Code server
    # AX_CODE_SKIP_START: true # skip start ax-code
    # AX_CODE_DESKTOP_AX_CODE_HOSTNAME: 0.0.0.0 # Bind AX Code to all interfaces
    restart: unless-stopped
